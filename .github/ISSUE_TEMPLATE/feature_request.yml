name: 💡 Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Tell us the problem first — the best features start from a real need.
  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - Server / REST API
        - Admin console (web)
        - Device agent (Android)
        - Updater / recovery (supervisor)
        - Deployment / setup
        - Cross-cutting / other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do, and what's getting in the way today?
      placeholder: I'm trying to… but I can't because…
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like MDMesh to do? Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other approaches you weighed.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for the same idea.
          required: true
