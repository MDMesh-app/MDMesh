name: agent-android

on:
  push:
    paths:
      - "agent-android/**"
      - "proto/**"
      - ".github/workflows/agent.yml"
  pull_request:
    paths:
      - "agent-android/**"
      - "proto/**"
      - ".github/workflows/agent.yml"

defaults:
  run:
    working-directory: agent-android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          # Installs this Gradle and puts `gradle` on PATH, so we don't need a
          # committed wrapper jar (can't be generated in the authoring sandbox).
          gradle-version: "8.10"
      - name: Assemble + lint + unit tests
        run: gradle --no-daemon assembleDebug lintDebug testDebugUnitTest

  # The version-treadmill guard: boot the agent on an emulator across API levels so
  # SDK_INT-gated breakage surfaces in CI, not the field. connectedCheck is a smoke
  # until instrumented tests exist.
  instrumentation-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [24, 30, 34, 35]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .
      - name: connectedCheck on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: aosp_atd
          arch: x86_64
          working-directory: agent-android
          script: gradle --no-daemon connectedDebugAndroidTest
