name: agent-android

on:
  push:
    paths:
      - "agent-android/**"
      - "proto/**"
      - ".github/workflows/agent.yml"
  pull_request:
    paths:
      - "agent-android/**"
      - "proto/**"
      - ".github/workflows/agent.yml"

defaults:
  run:
    working-directory: agent-android

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          # Installs this Gradle and puts `gradle` on PATH, so we don't need a
          # committed wrapper jar (can't be generated in the authoring sandbox).
          gradle-version: "8.10"
      - name: Assemble + lint + unit tests
        run: gradle --no-daemon assembleDebug lintDebug testDebugUnitTest

  # NOTE: an emulator-based instrumentation matrix (the "version-treadmill guard" — boot the agent
  # across API levels so SDK_INT-gated breakage surfaces in CI) is deferred until real instrumented
  # (androidTest) tests exist. Running emulators to execute zero tests was slow and flaky (and
  # aosp_atd images don't exist for older API levels), so it's removed for now rather than left red.
