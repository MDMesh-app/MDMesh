name: server

on:
  push:
    paths:
      - "pom.xml"
      - "common/**"
      - "jwt/**"
      - "notification/**"
      - "plugins/**"
      - "server/**"
      - "swagger/**"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "pom.xml"
      - "common/**"
      - "jwt/**"
      - "notification/**"
      - "plugins/**"
      - "server/**"
      - "swagger/**"
      - ".github/workflows/server.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Provide build.properties
        run: cp server/build.properties.example server/build.properties
      - name: Contract + unit tests (DB-free)
        # The :common tests (incl. AgentV1ContractTest — the backward-compat gate) need no database.
        # Keep -DskipTests on the package step until a CI test DB exists for the DB-bound modules.
        run: mvn -B -pl common test
      - name: Build WAR
        run: mvn -B -DskipTests package
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-war
          path: server/target/launcher.war
          if-no-files-found: error
