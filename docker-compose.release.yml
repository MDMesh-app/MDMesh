# Pull-only MDMesh stack — no build context, every service runs a published GHCR image. This is the
# "no clone, no build" deploy. Easiest via quickstart.sh, or by hand:
#
#   curl -fsSLO https://raw.githubusercontent.com/MDMesh-app/MDMesh/main/docker-compose.release.yml
#   # write a .env (DB_PASSWORD, HASH_SECRET, BASE_URL, IMAGE_OWNER, …) — see quickstart.sh
#   docker compose -f docker-compose.release.yml --profile cloudflare up -d                 # tunnel
#   docker compose -f docker-compose.release.yml -f docker-compose.domain.yml up -d         # own domain
#
# Pin SERVER_VERSION/WEB_VERSION/SUPERVISOR_VERSION in .env for production; they default to :latest.
services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hmdm}
      POSTGRES_USER: ${DB_USER:-hmdm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hmdm} -d ${DB_NAME:-hmdm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    image: ghcr.io/${IMAGE_OWNER:-mdmesh-app}/mdmesh-server:${SERVER_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hmdm}
      DB_USER: ${DB_USER:-hmdm}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      BASE_URL: ${BASE_URL:?set BASE_URL in .env}
      HASH_SECRET: ${HASH_SECRET:?set HASH_SECRET in .env}
      SECURE_ENROLLMENT: ${SECURE_ENROLLMENT:-0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_FROM: ${SMTP_FROM:-mdm@localhost}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - hmdmdata:/opt/hmdm

  caddy:
    image: ghcr.io/${IMAGE_OWNER:-mdmesh-app}/mdmesh-web:${WEB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - server
      - supervisor
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  supervisor:
    image: ghcr.io/${IMAGE_OWNER:-mdmesh-app}/mdmesh-supervisor:${SUPERVISOR_VERSION:-latest}
    restart: unless-stopped
    working_dir: /project
    environment:
      GITHUB_REPO: ${GITHUB_REPO:-}
      UPDATE_CHANNEL: ${UPDATE_CHANNEL:-stable}
      POLL_INTERVAL_HOURS: ${POLL_INTERVAL_HOURS:-6}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CURRENT_VERSION: ${CURRENT_VERSION:-0.0.0}
      AUTO_UPDATE: ${AUTO_UPDATE:-0}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-mdmesh}
      COMPOSE_FILE: ${COMPOSE_FILE:-docker-compose.yml}
      COMPOSE_PROFILES: ${COMPOSE_PROFILES:-}
      DB_USER: ${DB_USER:-hmdm}
      DB_NAME: ${DB_NAME:-hmdm}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
      - backups:/backups

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["cloudflare"]
    depends_on:
      - caddy
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}

volumes:
  pgdata:
  hmdmdata:
  caddy_data:
  caddy_config:
  backups:
