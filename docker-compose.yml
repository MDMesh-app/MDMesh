# MDMesh production stack. Configure via .env (generated by ./setup.sh), then:
#   Cloudflare Tunnel:  docker compose --profile cloudflare up -d
#   Own domain (HTTPS): docker compose -f docker-compose.yml -f docker-compose.domain.yml up -d
#
# Security defaults: Postgres and the server publish NO host ports; the edge (Caddy) is the only
# thing exposed, and only in the own-domain override. In tunnel mode nothing is published at all —
# cloudflared reaches Caddy over the internal network.

services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hmdm}
      POSTGRES_USER: ${DB_USER:-hmdm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hmdm} -d ${DB_NAME:-hmdm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    # Pull-based updates use the versioned GHCR image; `build:` is the source-deploy fallback (when an
    # image tag isn't published locally, compose builds it and tags it with this name). apply.sh bumps
    # SERVER_VERSION in .env then `docker compose pull server` to fetch the new signed image.
    image: ghcr.io/${IMAGE_OWNER:-local}/mdmesh-server:${SERVER_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-hmdm}
      DB_USER: ${DB_USER:-hmdm}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      BASE_URL: ${BASE_URL:?set BASE_URL in .env}
      HASH_SECRET: ${HASH_SECRET:?set HASH_SECRET in .env}
      SECURE_ENROLLMENT: ${SECURE_ENROLLMENT:-0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_FROM: ${SMTP_FROM:-mdm@localhost}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - hmdmdata:/opt/hmdm

  caddy:
    # The web image (Caddy + baked SPA). Same pull/build duality as `server`; WEB_VERSION tracks the
    # release. apply.sh recreates `server` + `caddy` together so the SPA matches the API.
    image: ghcr.io/${IMAGE_OWNER:-local}/mdmesh-web:${WEB_VERSION:-latest}
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - server
      - supervisor
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # Decoupled updater/recovery service. Polls GitHub for new releases, verifies the signed manifest,
  # exposes /update/status, serves /recovery, and (Phase 4) applies updates by driving compose against
  # the host daemon. The docker socket is host-root-equivalent — the supervisor is trusted and acts
  # only on VERIFIED manifests + AUTHORIZED callers (cookie-forward authz). It NEVER recreates itself
  # or postgres; apply.sh touches only `server` + `caddy`.
  supervisor:
    build:
      context: .
      dockerfile: docker/supervisor.Dockerfile
    restart: unless-stopped
    working_dir: /project
    environment:
      GITHUB_REPO: ${GITHUB_REPO:-}
      UPDATE_CHANNEL: ${UPDATE_CHANNEL:-stable}
      POLL_INTERVAL_HOURS: ${POLL_INTERVAL_HOURS:-6}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      CURRENT_VERSION: ${CURRENT_VERSION:-0.0.0}
      AUTO_UPDATE: ${AUTO_UPDATE:-0}
      # Pin project + compose-file set so the supervisor drives the SAME stack the host launched
      # (default project name = dir basename would fork a duplicate; COMPOSE_FILE carries the domain
      # overlay so recreating caddy keeps its published ports).
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-mdmesh}
      COMPOSE_FILE: ${COMPOSE_FILE:-docker-compose.yml}
      COMPOSE_PROFILES: ${COMPOSE_PROFILES:-}
      DB_USER: ${DB_USER:-hmdm}
      DB_NAME: ${DB_NAME:-hmdm}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/project
      - backups:/backups

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["cloudflare"]
    depends_on:
      - caddy
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}

volumes:
  pgdata:
  hmdmdata:
  caddy_data:
  caddy_config:
  backups:   # supervisor pre-update DB dumps + version snapshots + auto.json (survives recreate)
